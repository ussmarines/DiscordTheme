name: Update Classes

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [update_class]

jobs:
  classUpdate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - id: update-src
        uses: metro420yt/class-update@v1
        with:
          folder: src
          ext: css
          diff: "https://raw.githubusercontent.com/SyndiShanX/Update-Classes/main/Changes.txt"

      - id: update-theme
        uses: metro420yt/class-update@v1
        with:
          folder: themes
          ext: css
          diff: "https://raw.githubusercontent.com/SyndiShanX/Update-Classes/main/Changes.txt"

      - uses: actions/setup-node@v4
        if: ${{ steps.update-src.outputs.totalChanges > 0 || steps.update-theme.outputs.totalChanges > 0 }}
        with:
          node-version: 20

      - name: Install dependencies
        if: ${{ steps.update-src.outputs.totalChanges > 0 || steps.update-theme.outputs.totalChanges > 0 }}
        run: npm ci

      - name: Rebuild release files
        if: ${{ steps.update-src.outputs.totalChanges > 0 || steps.update-theme.outputs.totalChanges > 0 }}
        run: |
          npm run build
          npm run check

      - uses: EndBug/add-and-commit@v10
        if: ${{ steps.update-src.outputs.totalChanges > 0 || steps.update-theme.outputs.totalChanges > 0 }}
        with:
          default_author: github_actions
          message: "chore: update classes >_<"
          fetch: true
